<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VNZ Scripts</title>
<style>
  /* Reset básico */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #020b1a; /* Azul bem escuro */
    color: #a0c4ff;
    line-height: 1.6;
  }

  header {
    background-color: #011029;
    padding: 20px 40px;
    display: flex;
    align-items: center;
  }

  /* Animação RGB lenta para o nome */
  @keyframes rgbShift {
    0% {
      color: rgb(255, 0, 0);
    }
    33% {
      color: rgb(0, 255, 0);
    }
    66% {
      color: rgb(0, 0, 255);
    }
    100% {
      color: rgb(255, 0, 0);
    }
  }

  .logo {
    font-weight: 900;
    font-size: 1.8rem;
    animation: rgbShift 15s linear infinite;
  }

  main {
    max-width: 700px;
    margin: 80px auto;
    padding: 0 20px;
    text-align: center;
  }

  main h1 {
    font-size: 3.5rem;
    color: #4da6ff;
    margin-bottom: 20px;
  }

  main p {
    font-size: 1.2rem;
    margin-bottom: 40px;
    color: #7fbfff;
  }

  .search-bar {
    display: flex;
    max-width: 500px;
    margin: 0 auto;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 20px #3399ff55;
  }

  .search-bar input[type="text"] {
    flex: 1;
    padding: 15px 20px;
    border: none;
    font-size: 1.2rem;
    background-color: #02254d;
    color: white;
  }

  .search-bar input[type="text"]::placeholder {
    color: #7aaaff;
  }

  .search-bar button {
    background-color: #3399ff;
    border: none;
    color: white;
    font-weight: 700;
    padding: 0 30px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: background-color 0.3s ease;
  }

  .search-bar button:hover {
    background-color: #66b2ff;
  }

  footer {
    margin-top: 100px;
    text-align: center;
    color: #2a5d9f;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo">VNZ Scripts</div>
</header>

<main>
  <h1>VNZ Scripts</h1>
  <p>Search the best Lua scripts available in the community uploaded by users!</p>

  <form class="search-bar" onsubmit="event.preventDefault();">
    <input type="text" placeholder="Search" />
    <button type="submit">Search</button>
  </form>
</main>

<footer>
  &copy; 2026 VNZ Scripts
</footer>

</body>
</html>
