<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VNZ Scripts</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #050f20; /* Azul bem escuro */
    color: #cce6ff;
    line-height: 1.6;
  }

  header {
    background-color: #030a17;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-weight: bold;
    font-size: 1.8rem;
    color: #66b2ff;
  }

  main {
    max-width: 800px;
    margin: 80px auto;
    padding: 0 25px;
    text-align: center;
  }

  main h1 {
    font-size: 3rem;
    color: #3399ff;
    margin-bottom: 20px;
    font-weight: 900;
  }

  .search-bar {
    display: flex;
    max-width: 600px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 15px #3399ff44;
  }

  .search-bar input[type="text"] {
    flex: 1;
    padding: 14px 20px;
    border: none;
    font-size: 1.1rem;
    background-color: #081a36;
    color: white;
  }

  .search-bar input[type="text"]::placeholder {
    color: #5577aa;
  }

  .search-bar button {
    background-color: #3399ff;
    border: none;
    color: white;
    font-weight: 700;
    padding: 0 25px;
    cursor: pointer;
    font-size: 1.1rem;
  }

  footer {
    margin-top: 100px;
    text-align: center;
    color: #335588;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo">VNZ Scripts</div>
</header>

<main>
  <h1>VNZ Scripts</h1>
  <p>Encontre os melhores scripts Lua para a comunidade.</p>

  <form class="search-bar" onsubmit="event.preventDefault();">
    <input type="text" placeholder="Search" />
    <button type="submit">Search</button>
  </form>
</main>

<footer>
  &copy; 2026 VNZ Scripts
</footer>

</body>
</html>
