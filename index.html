<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anúncio - TyF Blox</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: auto;
    background-color: #111100;
    border-radius: 12px;
    padding: 20px;
  }
  img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
  }
  h1 {
    color: #ffeb3b;
    margin-bottom: 10px;
  }
  /* Abas */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  .tab {
    padding: 10px 15px;
    background-color: #333300;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    color: #f0f0f0;
  }
  .tab.active {
    background-color: #ffeb3b;
    color: #000;
  }
  .tab-content {
    display: none;
    background-color: #222200;
    border-radius: 8px;
    padding: 15px;
  }
  .tab-content.active {
    display: block;
  }
  /* Produtos */
  .product-list {
    margin-bottom: 15px;
  }
  /* Perguntas */
  .questions-list {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 15px;
  }
  .question-item {
    border-bottom: 1px solid #444400;
    padding: 8px 0;
  }
  .answer {
    color: #aaffaa;
    margin-left: 15px;
  }
  form textarea {
    width: 100%;
    height: 60px;
    border-radius: 8px;
    border: 1px solid #444400;
    background-color: #111100;
    color: #fff;
    padding: 8px;
    resize: none;
  }
  form button {
    margin-top: 8px;
    background-color: #ffeb3b;
    border: none;
    padding: 10px 15px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="container">
  <img id="adImage" src="" alt="Imagem do anúncio" />
  <h1 id="adTitle">Título do Anúncio</h1>

  <div class="tabs">
    <div class="tab active" data-tab="products">Produtos</div>
    <div class="tab" data-tab="description">Descrição</div>
    <div class="tab" data-tab="questions">Perguntas</div>
  </div>

  <div id="products" class="tab-content active">
    <div class="product-list" id="productList">
      <p>Nenhum produto listado.</p>
    </div>
  </div>

  <div id="description" class="tab-content">
    <p id="adDescription">Descrição do produto não disponível.</p>
  </div>

  <div id="questions" class="tab-content">
    <div class="questions-list" id="questionsList">
      <p>Nenhuma pergunta ainda.</p>
    </div>
    <form id="questionForm">
      <textarea id="questionInput" placeholder="Faça sua pergunta aqui..." required></textarea>
      <button type="submit">Enviar Pergunta</button>
    </form>
  </div>
</div>

<script>
  // Dados simulados para exemplo
  const adsData = {
    "1": {
      title: "Game Title 1",
      img: "https://cdn.iset.io/assets/59429/produtos/1433/image47.jpg",
      description: "Descrição do produto não disponível.",
      products: []
    },
    "2": {
      title: "Game Title 2",
      img: "https://tr.rbxcdn.com/abcdef1234567890abcdef1234567890/420/420/Image/Png",
      description: "Descrição do produto não disponível.",
      products: []
    }
  };

  let questions = [];

  function loadAd() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id || !adsData[id]) {
      alert('Anúncio não encontrado.');
      return;
    }
    const ad = adsData[id];
    document.getElementById('adTitle').textContent = ad.title;
    document.getElementById('adImage').src = ad.img;
    document.getElementById('adDescription').textContent = ad.description;

    const productList = document.getElementById('productList');
    productList.innerHTML = '';
    if (ad.products.length === 0) {
      productList.innerHTML = '<p>Nenhum produto listado.</p>';
    } else {
      ad.products.forEach(prod => {
        const p = document.createElement('p');
        p.textContent = `${prod.name} - R$ ${prod.price}`;
        productList.appendChild(p);
      });
    }
  }

  // Gerenciar abas
  const tabs = document.querySelectorAll('.tab');
  const contents = document.querySelectorAll('.tab-content');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      contents.forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('active');
    });
  });

  // Perguntas
  const questionForm = document.getElementById('questionForm');
  const questionsList = document.getElementById('questionsList');
  const questionInput = document.getElementById('questionInput');

  function renderQuestions() {
    questionsList.innerHTML = '';
    if (questions.length === 0) {
      questionsList.innerHTML = '<p>Nenhuma pergunta ainda.</p>';
      return;
    }
    questions.forEach(q => {
      const div = document.createElement('div');
      div.className = 'question-item';
      div.innerHTML = `<strong>Pergunta:</strong> ${q.question}`;
      if (q.answer) {
        const ans = document.createElement('div');
        ans.className = 'answer';
        ans.innerHTML = `<strong>Resposta:</strong> ${q.answer}`;
        div.appendChild(ans);
      }
      questionsList.appendChild(div);
    });
  }

  questionForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const questionText = questionInput.value.trim();
    if (!questionText) return;
    questions.push({ question: questionText, answer: null });
    questionInput.value = '';
    renderQuestions();
    alert('Pergunta enviada! Aguarde a resposta.');
  });

  loadAd();
  renderQuestions();
</script>

</body>
</html>
