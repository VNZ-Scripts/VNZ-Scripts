<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anúncio - TyF Blox</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: auto;
    background-color: #111100;
    border-radius: 12px;
    padding: 20px;
  }
  img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
  }
  h1 {
    color: #ffeb3b;
    margin-bottom: 10px;
  }
  button.toggle-products {
    background-color: #ffeb3b;
    border: none;
    padding: 10px 15px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .product-list {
    display: none;
    background-color: #222200;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 15px;
  }
  .description {
    margin-bottom: 20px;
  }
  .questions-section {
    background-color: #222200;
    border-radius: 8px;
    padding: 15px;
  }
  .questions-section h2 {
    color: #ffeb3b;
    margin-bottom: 10px;
  }
  .questions-list {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 15px;
  }
  .question-item {
    border-bottom: 1px solid #444400;
    padding: 8px 0;
  }
  .answer {
    color: #aaffaa;
    margin-left: 15px;
  }
  form textarea {
    width: 100%;
    height: 60px;
    border-radius: 8px;
    border: 1px solid #444400;
    background-color: #111100;
    color: #fff;
    padding: 8px;
    resize: none;
  }
  form button {
    margin-top: 8px;
    background-color: #ffeb3b;
    border: none;
    padding: 10px 15px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="container">
  <img id="adImage" src="" alt="Imagem do anúncio" />
  <h1 id="adTitle">Título do Anúncio</h1>

  <button class="toggle-products" id="toggleProductsBtn">▼ Produtos</button>
  <div class="product-list" id="productList">
    <!-- Lista de produtos vazia por enquanto -->
    <p>Nenhum produto listado.</p>
  </div>

  <div class="description" id="adDescription">
    <!-- Descrição do produto -->
    <p>Descrição do produto não disponível.</p>
  </div>

  <div class="questions-section">
    <h2>Perguntas sobre este produto</h2>
    <div class="questions-list" id="questionsList">
      <!-- Perguntas e respostas aparecerão aqui -->
    </div>
    <form id="questionForm">
      <textarea id="questionInput" placeholder="Faça sua pergunta aqui..." required></textarea>
      <button type="submit">Enviar Pergunta</button>
    </form>
  </div>
</div>

<script>
  // Simulação de dados para exemplo
  const adsData = {
    "1": {
      title: "Game Title 1",
      img: "https://cdn.iset.io/assets/59429/produtos/1433/image47.jpg",
      description: "Descrição do produto não disponível.",
      products: [] // lista vazia por enquanto
    },
    "2": {
      title: "Game Title 2",
      img: "https://tr.rbxcdn.com/abcdef1234567890abcdef1234567890/420/420/Image/Png",
      description: "Descrição do produto não disponível.",
      products: []
    }
  };

  // Perguntas armazenadas localmente (exemplo)
  let questions = [];

  // Função para carregar anúncio baseado no id da URL
  function loadAd() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id || !adsData[id]) {
      alert('Anúncio não encontrado.');
      return;
    }
    const ad = adsData[id];
    document.getElementById('adTitle').textContent = ad.title;
    document.getElementById('adImage').src = ad.img;
    document.getElementById('adDescription').innerHTML = `<p>${ad.description}</p>`;

    // Produtos (vazio por enquanto)
    const productList = document.getElementById('productList');
    productList.innerHTML = '';
    if (ad.products.length === 0) {
      productList.innerHTML = '<p>Nenhum produto listado.</p>';
    } else {
      ad.products.forEach(prod => {
        const p = document.createElement('p');
        p.textContent = `${prod.name} - R$ ${prod.price}`;
        productList.appendChild(p);
      });
    }
  }

  // Toggle produtos
  const toggleBtn = document.getElementById('toggleProductsBtn');
  const productListDiv = document.getElementById('productList');
  toggleBtn.addEventListener('click', () => {
    if (productListDiv.style.display === 'block') {
      productListDiv.style.display = 'none';
      toggleBtn.textContent = '▼ Produtos';
    } else {
      productListDiv.style.display = 'block';
      toggleBtn.textContent = '▲ Produtos';
    }
  });

  // Gerenciar perguntas
  const questionForm = document.getElementById('questionForm');
  const questionsList = document.getElementById('questionsList');
  const questionInput = document.getElementById('questionInput');

  function renderQuestions() {
    questionsList.innerHTML = '';
    if (questions.length === 0) {
      questionsList.innerHTML = '<p>Nenhuma pergunta ainda.</p>';
      return;
    }
    questions.forEach((q, i) => {
      const div = document.createElement('div');
      div.className = 'question-item';
      div.innerHTML = `<strong>Pergunta:</strong> ${q.question}`;
      if (q.answer) {
        const ans = document.createElement('div');
        ans.className = 'answer';
        ans.innerHTML = `<strong>Resposta:</strong> ${q.answer}`;
        div.appendChild(ans);
      }
      questionsList.appendChild(div);
    });
  }

  questionForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const questionText = questionInput.value.trim();
    if (!questionText) return;
    // Adiciona pergunta sem resposta
    questions.push({ question: questionText, answer: null });
    questionInput.value = '';
    renderQuestions();
    alert('Pergunta enviada! Aguarde a resposta.');
  });

  // Inicializa
  loadAd();
  renderQuestions();

  // Nota: Para controle de respostas só por você, é necessário backend e autenticação,
  // aqui só temos front-end para envio e exibição de perguntas.
</script>

</body>
</html>
