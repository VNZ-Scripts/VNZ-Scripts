<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TyF Blox</title>
<style>
  /* Reset básico */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #000000; /* Fundo preto */
    color: #f0f0f0; /* Branco suave para texto */
    line-height: 1.6;
  }

  header {
    background-color: #000000; /* Fundo preto */
    padding: 15px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  /* Nome do site oculto (sem texto) para você alterar depois */
  .logo {
    font-weight: 900;
    font-size: 1.8rem;
    color: transparent; /* invisível */
    user-select: none;
    flex-shrink: 0;
  }

  /* Menu em abas */
  nav {
    flex-grow: 1;
  }

  .tabs {
    display: flex;
    gap: 15px;
    list-style: none;
  }

  .tabs li {
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 8px;
    background-color: #333300; /* amarelo escuro suave */
    color: #f0f0f0; /* branco suave */
    font-weight: 600;
    transition: background-color 0.3s ease;
  }

  .tabs li:hover,
  .tabs li.active {
    background-color: #ffeb3b; /* amarelo claro confortável */
    color: #000000; /* texto preto para contraste */
  }

  /* Barra de busca no topo */
  .search-bar {
    display: flex;
    max-width: 300px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 10px #ffeb3baa; /* sombra amarela suave */
    flex-shrink: 0;
  }

  .search-bar input[type="text"] {
    flex: 1;
    padding: 10px 15px;
    border: none;
    font-size: 1rem;
    background-color: #111100; /* amarelo muito escuro para fundo */
    color: #f0f0f0; /* branco suave */
  }

  .search-bar input[type="text"]::placeholder {
    color: #bdb76b; /* amarelo escuro */
  }

  .search-bar button {
    background-color: #ffeb3b; /* amarelo claro */
    border: none;
    color: #000000; /* texto preto */
    font-weight: 700;
    padding: 0 15px;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.3s ease;
  }

  .search-bar button:hover {
    background-color: #fdd835; /* amarelo um pouco mais escuro */
  }

  main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }

  /* Espaço para anúncios */
  .ads-container {
    background-color: #111100; /* amarelo muito escuro */
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 20px #ffeb3baa;
  }

  .ads-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #ffeb3b; /* amarelo claro */
    margin-bottom: 20px;
  }

  .ads-list {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
  }

  .ad-item {
    min-width: 200px;
    background-color: #333300; /* amarelo escuro suave */
    border-radius: 10px;
    box-shadow: 0 0 10px #ffeb3baa;
    padding: 15px;
    color: #f0f0f0; /* branco suave */
    flex-shrink: 0;
  }

  .ad-item img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
    object-fit: cover;
    height: 140px;
  }

  .ad-item h3 {
    font-size: 1.1rem;
    margin-bottom: 6px;
  }

  .ad-item p {
    font-size: 0.9rem;
    color: #dcdcdc; /* cinza claro para texto */
  }

  /* Scrollbar para anúncios */
  .ads-list::-webkit-scrollbar {
    height: 8px;
  }
  .ads-list::-webkit-scrollbar-thumb {
    background-color: #ffeb3baa;
    border-radius: 4px;
  }

  footer {
    margin-top: 100px;
    text-align: center;
    color: #bdb76b; /* amarelo escuro */
    font-size: 0.9rem;
  }

  /* Responsividade */
  @media (max-width: 900px) {
    main {
      max-width: 100%;
      padding: 0 10px;
    }
  }

  @media (max-width: 600px) {
    header {
      justify-content: center;
      gap: 10px;
      padding: 15px 20px;
    }
    nav {
      order: 2;
      width: 100%;
    }
    .tabs {
      justify-content: center;
      flex-wrap: wrap;
    }
    .search-bar {
      order: 1;
      max-width: 100%;
      margin-bottom: 10px;
    }
    .ads-list {
      gap: 10px;
      padding-bottom: 15px;
    }
    .ad-item {
      min-width: 150px;
      padding: 10px;
    }
    .ad-item h3 {
      font-size: 1rem;
    }
    .ad-item p {
      font-size: 0.85rem;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">TyF Blox</div>
  <nav>
    <ul class="tabs">
      <li class="active">Home</li>
      <li>Accounts</li>
      <li>Pricing</li>
      <li>Contact</li>
    </ul>
  </nav>
  <form class="search-bar" onsubmit="event.preventDefault();">
    <input type="text" placeholder="Search" />
    <button type="submit">Search</button>
  </form>
</header>

<main>

  <section class="ads-container">
    <h2 class="ads-title">Roblox Game Ads</h2>
    <div class="ads-list">
      <!-- Primeiro anúncio com imagem do Tio Patinhas via link externo -->
      <div class="ad-item">
        <img src="https://cdn.iset.io/assets/59429/produtos/1433/image47.jpg" alt="Tio Patinhas" />
        <h3>Game Title 1</h3>
        <p>Short description of the game or promotion.</p>
      </div>
      <!-- Segundo anúncio exemplo -->
      <div class="ad-item">
        <img src="https://tr.rbxcdn.com/abcdef1234567890abcdef1234567890/420/420/Image/Png" alt="Game 2" />
        <h3>Game Title 2</h3>
        <p>Short description of the game or promotion.</p>
      </div>
      <!-- Adicione mais anúncios aqui -->
    </div>
  </section>

</main>

<footer>
  &copy; 2026 TyF Blox
</footer>

</body>
</html>
